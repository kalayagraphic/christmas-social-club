<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Choose Your Deck</title>

<link rel="stylesheet" href="https://use.typekit.net/lpr7yir.css">

<style>

  /* ======================================= */
/* FONTS */
/* ======================================= */

@font-face{

  font-family:"Alte Haas";
  src:url("font/AlteHaasGroteskRegular.ttf");

}

@font-face {
  font-family: "Alte Haas Bold" ;
  src: url(font/AlteHaasGroteskBold.ttf);
}

/* ======================================= */
/* RESET */
/* ======================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Alte Haas", "Alte Haas Bold", sans-serif;
}

html{
  scroll-behavior:smooth;
}

body{

  background-image:
radial-gradient(at 51% 32%, #f8f6f3 0px, transparent 50%),
radial-gradient(at 90% 14%, #3e5145 0px, transparent 50%),
radial-gradient(at 0% 51%, #fff999 0px, transparent 50%),
radial-gradient(at 55% 84%, #d579ab 0px, transparent 50%),
radial-gradient(at 0% 100%, #fff999 0px, transparent 50%),
radial-gradient(at 94% 87%, #d579ab 0px, transparent 50%),
radial-gradient(at 0% 0%, #d579ab 0px, transparent 50%);

  background-attachment:fixed;

  width:100%;
  min-height:100vh;

  overflow-x:hidden;

  display:flex;
  justify-content:center;

}

.wrapper{
  width:100%;
  max-width:430px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.landing{
  width:100%;
  height:100svh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
  padding:40px 20px;
}

.logo{
  width: 90%;
  max-width: 380px;
  text-align:center;
  animation: fadeSlideUp 1s ease both;
}


.arrow-wrap{
  position:absolute;
  bottom:36px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  cursor:pointer;
  animation: fadeSlideUp 1s 0.5s ease both;
}

.arrow-label{
  color:rgba(248,246,243,0.4);
  font-family:"Alte Haas";
  font-size:10px;
  letter-spacing:2.5px;
  text-transform:uppercase;
}

.arrow-svg{
  width:28px;
  height:28px;
  animation: bounce 1.6s ease-in-out infinite;
}

.arrow-svg path{
  stroke:rgba(248,246,243,0.55);
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}

.deck-section{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:60px 20px 140px;
}

.title{
  color:#3e5145;
  font-family: "lores-9-plus-narrow", sans-serif;
  font-weight:700;
  font-style:normal;
  font-size:62px;
  line-height:0.9;
  text-align:center;
  margin-bottom:50px;
  opacity:0;
  transform:translateY(30px);
  transition: opacity 0.7s ease, transform 0.7s ease;
  width:280px;
}

.title img{
  width:100%;
}

.title.visible{
  opacity:1;
  transform:translateY(0);
}

@keyframes fadeSlideUp{
  from{ opacity:0; transform:translateY(24px); }
  to{ opacity:1; transform:translateY(0); }
}

@keyframes bounce{
  0%, 100%{ transform:translateY(0); }
  50%{ transform:translateY(8px); }
}


/* ======================================= */
/* SCENE */
/* ======================================= */



/* ======================================= */
/* TITLE */
/* ======================================= */


/* ======================================= */
/* CARDS COLUMN */
/* ======================================= */

.cards-column{

  width:100%;

  display:flex;
  flex-direction:column;
  align-items:center;

  gap:22px;

  position:relative;

}

/* ======================================= */
/* CARD */
/* ======================================= */

.category-card{

  width:100%;
  max-width:320px;

  aspect-ratio:2.5/3.5;

  border-radius:32px;

  padding:24px;

  position:relative;

  overflow:hidden;

  display:flex;
  flex-direction:column;
  justify-content:space-between;

  color: #f8f6f3;

  cursor:pointer;

  box-shadow:
  0px 18px 45px rgba(0,0,0,0.35);

  translate:0 50px;
  opacity:0;

  transition:
  transform 0.2s linear,
  opacity 0.5s ease;

}

.category-card.visible{ opacity:1; translate:0 0; }


/* ======================================= */
/* COLORS */
/* ======================================= */

.social{
   background-image:url(img/card\ social-01.jpg);

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.antisocial{
  background-image:url(img/card\ antisocial-01.jpg);

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.hybrid{
 background-image:url(img/card\ antiantisocial-01.jpg);

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* ======================================= */
/* TEXT */
/* ======================================= */

.category-card h2{

  font-size:45px;
  line-height:0.85;
  font-family: "Alte Haas Bold";
  font-weight:700;

}

.category-card p{

  font-size:15px;
  font-family: "Alte Haas";
  opacity:0.7;

}

/* ======================================= */
/* RANDOM BUTTON */
/* ======================================= */

.random-button{

  margin-top:40px;

  color:white;
  font-family: "Alte Haas Bold";
  font-size:28px;
  font-weight:600;

  cursor:pointer;

  opacity:0;

  padding-bottom:6px;

  border-bottom:
  2px solid rgba(255,255,255,0.5);

  transition:0.3s;

  translate:0 30px;

}

.random-button.visible{ opacity:0.9; translate:0 0; }

.random-button:hover{
  opacity:1;
}

/* ======================================= */
/* SHUFFLE MODE */
/* ======================================= */

.shuffle-mode{

  position:absolute !important;

  left:50%;

  margin-left:-160px;

}

</style>

</head>

<body>

<div class="wrapper">

  <!-- LANDING -->
  <section class="landing" id="landing">

    <img
      class="logo"
      src="img/logo-landing.png"
      alt="Antianti Social">


    <div
      class="arrow-wrap"
      onclick="document.getElementById('choose').scrollIntoView({behavior:'smooth'})" style="color:#3e5145">
      <span class="arrow-label" style="color:#3e5145;">scroll</span>
      <svg class="arrow-svg" viewBox="0 0 40 40" style="color:#3e5145">
        <path d="M6 10 L14 18 L22 10"/>
      </svg>
    </div>

  </section>

  <!-- CHOOSE SECTION -->
  <section class="deck-section" id="choose">

  <div class="title" id="sectionTitle">
    <img src="img/choose-your-deck.png" alt="Choose your deck"
    style="filter: drop-shadow(0px 4px 16px rgb(255, 255, 255));">
  </div>

    <div class="cards-column">

      <div class="category-card social" data-category="social">
        <h2 style="color: #fff999;">SOCIAL</h2>
        <p style="color:#fff999;">outgoing / expressive</p>
      </div>

      <div class="category-card antisocial" data-category="antisocial">
        <h2 style="color: #d579ab;">ANTI<br>SOCIAL</h2>
        <p style="color: #d579ab;">detached / neutral</p>
      </div>

      <div class="category-card hybrid" data-category="hybrid">
        <h2>ANTIANTI<br>SOCIAL</h2>
        <p style="color:#f8f6f3">distant / absent</p>
      </div>

    </div>

    <a class="random-button" id="randomBtn" href="deck.html?category=random">
      I DON'T KNOW
    </a>

  </section>

</div>

<script>

const cards = document.querySelectorAll(".category-card");

cards.forEach(card => {
  card.addEventListener("click", () => {
    const category = card.dataset.category;
    window.location.href = `deck.html?category=${category}`;
  });
});

const revealEls = [
  { el: document.getElementById("sectionTitle"), delay: 0 },
  { el: document.querySelectorAll(".category-card")[0], delay: 120 },
  { el: document.querySelectorAll(".category-card")[1], delay: 240 },
  { el: document.querySelectorAll(".category-card")[2], delay: 360 },
  { el: document.getElementById("randomBtn"), delay: 480 },
];

const observer = new IntersectionObserver(
  (entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        const item = revealEls.find(r => r.el === entry.target);
        const delay = item ? item.delay : 0;
        setTimeout(()=>{ entry.target.classList.add("visible"); }, delay);
        observer.unobserve(entry.target);
      }
    });
  },
  { threshold: 0.15 }
);

revealEls.forEach(item => { if(item.el){ observer.observe(item.el); } });

</script>

</body>

</html>
